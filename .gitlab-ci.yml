variables:
    PLUGIN_NAME: 'deiaSurvey'

include:
  - project: 'documentacao-e-tarefas/modelosparaintegracaocontinua'
    ref: stable-3_5_0
    file:
      - 'templates/groups/pkp_plugin.yml'
      - 'templates/groups/ojs/unit_tests.yml'
      - 'templates/groups/ojs/cypress_tests.yml'
      - 'templates/groups/ops/cypress_tests.yml'

.unit_test_template:
  before_script:
    - sed -i 's/api_key_secret = ""/api_key_secret = "$API_KEY_SECRET"/' /var/www/$APPLICATION/config.inc.php

.integration_tests_template:
  before_script:
    - sed -i 's/api_key_secret = ""/api_key_secret = "$API_KEY_SECRET"/' /var/www/$APPLICATION/config.inc.php

# Desabilita os jobs de testes de aceitação da aplicação, por enquanto
ojs_integration_tests:
  rules:
    - when: never

ops_integration_tests:
  rules:
    - when: never
